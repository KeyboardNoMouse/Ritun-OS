<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ritun OS</title>

<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Inter,sans-serif;
background:black;
overflow:hidden;
}

.window-node{
position:fixed;
display:flex;
flex-direction:column;
transform:translateZ(0);
will-change:transform,top,left,width,height;
}

.glass{
background:rgba(30,30,30,0.6);
backdrop-filter:blur(12px);
}

.dock{
backdrop-filter:blur(12px);
background:rgba(20,20,20,0.5);
}

</style>

</head>

<body x-data="osData()" x-init="initOS()" class="text-white">

<!-- BOOT SCREEN -->

<div
x-show="bootOpen"
class="fixed inset-0 bg-black flex flex-col items-center justify-center z-[9999]">

<h1 class="text-4xl font-bold mb-6">
Ritun OS
</h1>

<div class="text-green-400 font-mono text-sm space-y-1">

<template x-for="line in bootLog">
<div x-text="line"></div>
</template>

</div>

</div>

<!-- DESKTOP -->

<div class="w-screen h-screen relative overflow-hidden">

<!-- TOP BAR -->

<div class="fixed top-0 left-0 right-0 h-10 glass flex items-center justify-between px-4">

<button
@click="toggleStartMenu()"
class="font-semibold">

Ritun

</button>

<div x-text="time"></div>

</div>

<!-- START MENU -->

<div
x-show="startMenuOpen"
@click.outside="startMenuOpen=false"
class="absolute bottom-16 left-6 w-60 glass p-4 rounded-xl">

<div class="space-y-3">

<button
@click="openWindow('about')"
class="block w-full text-left">

About

</button>

<button
@click="openWindow('browser')"
class="block w-full text-left">

Browser

</button>

</div>

</div>

<!-- ABOUT WINDOW -->

<div
x-show="windows.about.open && !windows.about.min"
class="window-node glass w-[400px] h-[300px] top-[120px] left-[200px] rounded-xl shadow-xl"
@mousedown="focusWindow('about')">

<div
class="flex items-center justify-between px-3 py-2 bg-black/40 cursor-move"
@mousedown="startDrag($event,'about')">

<span>About</span>

<div class="space-x-2">

<button
@click="windows.about.min=true">

–

</button>

<button
@click="windows.about.open=false">

✕

</button>

</div>

</div>

<div class="flex-1 p-4 overflow-auto">

<h2 class="text-xl font-semibold mb-2">
Ritun OS
</h2>

<p>
A browser based desktop environment created as a portfolio project.
</p>

</div>

</div>

<!-- BROWSER WINDOW -->

<div
x-show="windows.browser.open && !windows.browser.min"
class="window-node glass w-[600px] h-[400px] top-[160px] left-[350px] rounded-xl shadow-xl"
@mousedown="focusWindow('browser')">

<div
class="flex items-center justify-between px-3 py-2 bg-black/40 cursor-move"
@mousedown="startDrag($event,'browser')">

<span>Browser</span>

<div class="space-x-2">

<button
@click="windows.browser.min=true">

–

</button>

<button
@click="windows.browser.open=false">

✕

</button>

</div>

</div>

<iframe
class="flex-1"
src="https://example.com">

</iframe>

</div>

<!-- DOCK -->

<div
class="dock fixed bottom-4 left-1/2 -translate-x-1/2 flex space-x-4 px-6 py-3 rounded-2xl">

<template x-for="app in dockApps">

<button
@click="openWindow(app.id)"
class="w-12 h-12 flex items-center justify-center rounded-lg bg-gray-800 hover:scale-110 transition">

<svg
xmlns="http://www.w3.org/2000/svg"
fill="none"
viewBox="0 0 24 24"
stroke="currentColor"
class="w-6 h-6"
x-html="app.icon">

</svg>

</button>

</template>

</div>

</div>

<script>

function osData(){

return{

bootOpen:true,
bootLog:[],
time:"",
startMenuOpen:false,
focused:null,

windows:{
about:{open:false,min:false},
browser:{open:false,min:false}
},

dockApps:[

{
id:"about",
icon:`<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01"/>`
},

{
id:"browser",
icon:`<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4h18v16H3z"/>`
}

],

dragging:null,
offsetX:0,
offsetY:0,

initOS(){

this.updateClock()

setInterval(()=>{
this.updateClock()
},1000)

const logs=[

"Initializing Ritun Kernel",
"Mounting file systems",
"Starting network manager",
"Loading desktop environment",
"Starting window manager",
"Launching Ritun OS"

]

let i=0

const boot=setInterval(()=>{

this.bootLog.push(logs[i])
i++

if(i>=logs.length){

clearInterval(boot)

setTimeout(()=>{
this.bootOpen=false
},1000)

}

},400)

},

updateClock(){

const d=new Date()

this.time=d.toLocaleTimeString([],{
hour:'2-digit',
minute:'2-digit'
})

},

toggleStartMenu(){

this.startMenuOpen=!this.startMenuOpen

},

openWindow(id){

const win=this.windows[id]

win.open=true
win.min=false

this.focusWindow(id)

},

focusWindow(id){

this.focused=id

},

startDrag(e,id){

const el=e.currentTarget.parentElement

this.dragging=el

this.offsetX=e.clientX-el.offsetLeft
this.offsetY=e.clientY-el.offsetTop

document.addEventListener("mousemove",this.drag)
document.addEventListener("mouseup",this.stopDrag)

},

drag(e){

if(!window.Alpine) return

const data=Alpine.store?null:null

},

stopDrag(){

document.removeEventListener("mousemove",this.drag)
document.removeEventListener("mouseup",this.stopDrag)

}

}

}

</script>

</body>
</html>
